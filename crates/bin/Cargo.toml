[package]
name = "routerbot"
description = "Routerbot binary."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
routerbot-app = { version = "0.1.0", path = "../app" }
routerbot-config = { version = "0.1.0", path = "../config" }
routerbot-chat-telegram = { version = "0.1.0", path = "../chat/telegram", optional = true }
routerbot-adapter-transmission = { version = "0.1.0", path = "../adapters/transmission", optional = true }
routerbot-adapter-keenetic = { version = "0.1.0", path = "../adapters/keenetic", optional = true }
routerbot-adapter-kubernetes = { version = "0.1.0", path = "../adapters/kubernetes", optional = true }
routerbot-adapter-dlna-k8s = { version = "0.1.0", path = "../adapters/dlna-k8s", optional = true }
routerbot-adapter-command = { version = "0.1.0", path = "../adapters/command", optional = true }

[features]
default = ["telegram", "transmission", "keenetic", "json-state"]
telegram = ["dep:routerbot-chat-telegram"]
transmission = ["dep:routerbot-adapter-transmission"]
keenetic = ["dep:routerbot-adapter-keenetic"]
kubernetes = ["dep:routerbot-adapter-kubernetes"]
dlna-k8s = ["kubernetes", "dep:routerbot-adapter-dlna-k8s"]
command = ["dep:routerbot-adapter-command"]
json-state = []
sqlite-state = []

[lints]
workspace = true
